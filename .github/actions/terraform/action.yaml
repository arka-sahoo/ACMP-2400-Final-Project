name: 'Terraform container actions'
description: 'Terraform action for demonstrations'
author: 'arka-sahoo@'
inputs:
  ARM_CLIENT_ID:
    description: 'Azure CLient ID'
    required: true
  ARM_CLIENT_SECRET:
    description: 'Azure client secret'
    required: true
  ARM_SUBSCRIPTION_ID:
    description: 'Azure subscription id'
    required: true
  ARM_TENANT_ID:
    description: 'Azure tenant id'
    required: true
  STATE_KEY:
    description: 'Unique value to identify your state slice'
    required: true
  TF_STAGE: 
    description: 'The terraform directory to use in the planning/apply phase'
    required: true
runs:
  using: 'docker'
  image: 'Dockerfile'